name: Publish Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set release tag name
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
        else
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign Release APK
      run: |
        keytool -genkeypair -v -keystore release.keystore -alias release-key -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=GroqVoiceTyper, O=OpenSource, C=US"
        APKSIGNER=$(find ${ANDROID_HOME:-/usr/local/lib/android/sdk} -name "apksigner" -type f | grep -v "\.jar" | head -n 1)
        if [ -z "$APKSIGNER" ]; then
          echo "ERROR: apksigner not found!"
          exit 1
        fi
        echo "Found apksigner at: $APKSIGNER"
        UNSIGNED_APK=$(find app/build/outputs/apk/release/ -name "*.apk" -type f | head -n 1)
        if [ -z "$UNSIGNED_APK" ]; then
          echo "ERROR: No release APK found!"
          exit 1
        fi
        echo "Found unsigned APK at: $UNSIGNED_APK"
        "$APKSIGNER" sign --ks release.keystore --ks-key-alias release-key --ks-pass pass:password123 --key-pass pass:password123 --out app-release.apk "$UNSIGNED_APK"
        echo "Successfully signed APK as app-release.apk"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        files: app-release.apk
        name: Release ${{ env.TAG_NAME }}
        draft: false
        prerelease: ${{ contains(env.TAG_NAME, '-') }}
        body: |
          ## 🎙️ Fluence ${{ env.TAG_NAME }} — Offline Mode & UI Refresh

          ### 🆕 What's New

          **Offline Transcription Mode 🔌**
          - Added 100% on-device voice typing powered by **Alibaba SenseVoice-Small** (quantized ONNX model, ~230MB)
          - Integrated **Silero VAD** (Voice Activity Detection) for smart silence detection during offline recording
          - Model downloads automatically on first use — no manual setup required
          - Includes checksum verification to ensure model integrity
          - Zero internet connection required when offline mode is active

          **Bug Fixes & Stability**
          - Fixed offline transcription glitches: VAD audio segments now processed sequentially via a Channel worker
          - Fixed touch-release accidentally restarting recording after stop
          - Improved UI thread performance and Compose recomposition optimizations

          **UI Polish**
          - Unified glass design across all overlay UIs with hover glow effects
          - Updated landing page with problem statement, comparison table, collapsible FAQs, and roadmap

          ---

          ### 📦 Installation
          Download `app-release.apk` below and install directly on your Android device (API 26+).
          > You may need to allow **"Install from Unknown Sources"** in your device settings.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
